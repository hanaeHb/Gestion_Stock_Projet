apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-notification
  template:
    metadata:
      labels:
        app: service-notification
    spec:
      containers:
        - name: service-notification
          image: notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: MONGO_URI
              value: "mongodb://host.docker.internal:27017/notification_db"

            # Kafka
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"

            # Eureka
            - name: EUREKA_HOST
              value: "discovery-service"

            - name: SECURITY_SERVICE_URL
              value: "http://gateway-service:8888"

---
apiVersion: v1
kind: Service
metadata:
  name: service-notification
spec:
  selector:
    app: service-notification
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
  type: LoadBalancer