spring.application.name=GatewayStockService
server.port=8888

# Discovery Configuration
spring.cloud.gateway.discovery.locator.enabled=true
# ???? ????? false ??? ???? ?????? ?? Routes ?????? (?????) ???? ???? ????
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Security & JWT
spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:keys/publicKey.pem
spring.main.allow-bean-definition-overriding=true

# Global CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true


