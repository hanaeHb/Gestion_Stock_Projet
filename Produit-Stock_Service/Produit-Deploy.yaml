apiVersion: apps/v1
kind: Deployment
metadata:
  name: produit-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: produit-service
  template:
    metadata:
      labels:
        app: produit-service
    spec:
      containers:
        - name: produit-service
          image: produit-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8062
          env:
            # MySQL Config - Pointing to local PC
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://host.docker.internal:3306/produitstockdb?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: ""
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.mysql.cj.jdbc.Driver
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: org.hibernate.dialect.MySQLDialect

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-service:8761/eureka/
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka-service:9092

            # JWT Keys
            - name: RSA_PUBLICKEY
              value: "classpath:keys/publicKey.pem"
            - name: RSA_PRIVATEKEY
              value: "classpath:keys/privateKey.pem"

---
apiVersion: v1
kind: Service
metadata:
  name: produit-service
spec:
  selector:
    app: produit-service
  ports:
    - protocol: TCP
      port: 8062
      targetPort: 8062
  type: LoadBalancer